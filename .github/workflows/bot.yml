name: Run Telegram Bot

on:
  schedule:
    # 4:00 AM San Luis Río Colorado / Mexicali
    # UTC-7 = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests deep-translator

      - name: Run script
        run: python telegram_bot.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: Save sent news history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add noticias_enviadas.json
          git commit -m "Update sent news history" || echo "No changes"
          git push
